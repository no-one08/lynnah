<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Lynnah 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- ENTRY -->
<div id="entry">
  <canvas id="entryCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>

  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1.8rem;">
    <!-- Glowing SVG heart -->
    <div class="entry-heart-wrap">
      <svg class="entry-heart-svg" viewBox="0 0 200 185" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ehg" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ff85a1"/>
            <stop offset="50%" stop-color="#ff4d6d"/>
            <stop offset="100%" stop-color="#c9184a"/>
          </radialGradient>
          <filter id="eglow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path fill="url(#ehg)" filter="url(#eglow)"
          d="M100 170 C100 170 15 115 15 60 C15 30 38 10 65 10 C80 10 93 18 100 30 C107 18 120 10 135 10 C162 10 185 30 185 60 C185 115 100 170 100 170Z"/>
        <circle cx="60" cy="45" r="3" fill="white" opacity="0.7" class="sparkle-dot"/>
        <circle cx="82" cy="28" r="2" fill="white" opacity="0.6" class="sparkle-dot"/>
        <circle cx="140" cy="38" r="2.5" fill="white" opacity="0.6" class="sparkle-dot"/>
        <circle cx="158" cy="62" r="2" fill="white" opacity="0.5" class="sparkle-dot"/>
        <circle cx="100" cy="55" r="1.5" fill="white" opacity="0.8" class="sparkle-dot"/>
      </svg>
      <div class="entry-heart-label">Happy Birthday</div>
    </div>

    <div class="entry-title">Something special<br>is waiting for you…</div>
    <div class="entry-sub">surprise</div>
    <button class="enter-btn" onclick="enterPage()">▶ &nbsp;Tap to Open</button>
  </div>
</div>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- RAIN CANVAS -->
<canvas id="rainCanvas"></canvas>



<!-- MUSIC BAR -->
<div class="music-bar">
  <span class="music-icon" id="musicIcon">♪</span>
  <div class="music-info">
    <div class="music-title">Those Eyes</div>
    <div class="music-artist">New West</div>
  </div>
  <button class="music-toggle" id="musicToggle" onclick="toggleMusic()">⏸</button>
</div>

<script src="photos.js"></script>
<script src="script.js"></script>
</body>
</html>
